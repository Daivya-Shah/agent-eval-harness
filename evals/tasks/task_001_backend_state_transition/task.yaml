id: task_001_backend_state_transition
title: Backend Issue Status Transition Robustness
description: >
  Repair or implement IssueFlow issue lifecycle transitions, resolved_at handling,
  closed-issue edit guards, and audit activity logging in the backend.
difficulty: medium
target_files:
  - apps/issueflow-backend/app/services/state_machine.py
  - apps/issueflow-backend/app/crud.py
  - apps/issueflow-backend/app/routes/issues.py
  - apps/issueflow-backend/app/models.py
  - apps/issueflow-backend/app/schemas.py
setup_command: pip install -e ".[dev]"
visible_test_command: pytest evals/tasks/task_001_backend_state_transition/visible_tests -q -c evals/pytest.ini --rootdir=evals
hidden_test_command: pytest evals/tasks/task_001_backend_state_transition/hidden_tests -q -c evals/pytest.ini --rootdir=evals
scoring_weights:
  correctness: 0.35
  hidden_tests: 0.30
  regression_safety: 0.15
  interface_contract: 0.10
  determinism: 0.10
timeout_seconds: 900
expected_capabilities:
  - state_machine_modeling
  - backend_api_validation
  - audit_logging
  - datetime_invariants
  - error_message_quality
common_failure_modes:
  - allows invalid lifecycle jumps
  - forgets resolved_at clearing on reopen
  - allows PATCH edits on closed issues
  - skips activity events on status change
  - duplicates activity on idempotent status posts
  - hardcodes transitions only for visible test paths
