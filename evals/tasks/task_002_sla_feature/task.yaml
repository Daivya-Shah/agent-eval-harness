id: task_002_sla_feature
title: SLA Status Calculation and API Exposure
description: >
  Implement deterministic SLA status calculation (healthy, at_risk, overdue, closed)
  based on issue priority and creation time, exposed on API responses as sla_status.
difficulty: medium
target_files:
  - apps/issueflow-backend/app/services/sla.py
  - apps/issueflow-backend/app/services/clock.py
  - apps/issueflow-backend/app/schemas.py
  - apps/issueflow-backend/app/crud.py
  - apps/issueflow-backend/app/routes/issues.py
  - apps/issueflow-frontend/src/components/SlaBadge.tsx
setup_command: pip install -e ".[dev]"
visible_test_command: pytest evals/tasks/task_002_sla_feature/visible_tests -q -c evals/pytest.ini --rootdir=evals
hidden_test_command: pytest evals/tasks/task_002_sla_feature/hidden_tests -q -c evals/pytest.ini --rootdir=evals
scoring_weights:
  correctness: 0.35
  hidden_tests: 0.30
  regression_safety: 0.10
  interface_contract: 0.15
  determinism: 0.10
timeout_seconds: 900
expected_capabilities:
  - time_based_business_logic
  - timezone_safe_datetime
  - api_field_exposure
  - boundary_condition_reasoning
common_failure_modes:
  - uses wall_clock directly in sla.py
  - off_by_one_at_sla_boundary
  - marks resolved_issues overdue
  - wrong_at_risk_percentage
  - ignores_naive_datetime_normalization
